<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Smart Medicine Reminder</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2>💊 Smart Medicine Reminder System</h2>

            <h5>
                Welcome,
                <span th:text="${user.name}"></span>
            </h5>

        </div>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>

    <!-- Dashboard -->

    <div class="row mb-4">

        <div class="col-md-4 mb-3">

            <div class="card bg-primary text-white shadow">

                <div class="card-body text-center">

                    <h5>Total Medicines</h5>

                    <h2 th:text="${totalMedicines}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card bg-success text-white shadow">

                <div class="card-body text-center">

                    <h5>Taken</h5>

                    <h2 th:text="${takenMedicines}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-4 mb-3">

            <div class="card bg-warning text-dark shadow">

                <div class="card-body text-center">

                    <h5>Pending</h5>

                    <h2 th:text="${pendingMedicines}"></h2>

                </div>

            </div>

        </div>

    </div>

    <!-- Next Reminder -->

    <div class="card shadow mb-4">

        <div class="card-header bg-info text-white">

            <h4>⏰ Next Reminder</h4>

        </div>

        <div class="card-body">

            <div th:if="${nextMedicine != null}">

                <h4 th:text="${nextMedicine.medicineName}"></h4>

                <p>
                    Dosage:
                    <span th:text="${nextMedicine.dosage}"></span>
                </p>

                <h5>
                    Time:
                    <span th:text="${nextMedicine.reminderTime}"></span>
                </h5>

            </div>

            <div th:if="${nextMedicine == null}">

                <h5>No upcoming reminders.</h5>

            </div>

        </div>

    </div>

    <!-- Add Medicine -->

    <div class="card shadow mb-4">

        <div class="card-header bg-success text-white">

            <h4>Add Medicine</h4>

        </div>

        <div class="card-body">

            <form th:action="@{/save}" th:object="${medicine}" method="post">

                <div class="mb-3">

                    <label>Medicine Name</label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{medicineName}"
                            required>

                </div>

                <div class="mb-3">

                    <label>Dosage</label>

                    <input
                            type="text"
                            class="form-control"
                            th:field="*{dosage}"
                            required>

                </div>

                <div class="mb-3">

                    <label>Reminder Time</label>

                    <input
                            type="time"
                            class="form-control"
                            th:field="*{reminderTime}"
                            required>

                </div>

                <button class="btn btn-success w-100">
                    Save Medicine
                </button>

            </form>

        </div>

    </div>

    <!-- Search -->

    <div class="card shadow mb-4">

        <div class="card-body">

            <form action="/search" method="get">

                <div class="input-group">

                    <input
                            type="text"
                            class="form-control"
                            name="keyword"
                            placeholder="Search medicine...">

                    <button class="btn btn-primary">
                        Search
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Medicine Table -->

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h4>Medicine List</h4>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-secondary">

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Dosage</th>

                    <th>Reminder Time</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="m : ${medicineList}">

                    <td th:text="${m.id}"></td>

                    <td th:text="${m.medicineName}"></td>

                    <td th:text="${m.dosage}"></td>

                    <td th:text="${m.reminderTime}"></td>

                    <td>

                        <span
                                class="badge bg-success"
                                th:if="${m.status=='Taken'}">

                            Taken

                        </span>

                        <span
                                class="badge bg-warning text-dark"
                                th:if="${m.status=='Pending'}">

                            Pending

                        </span>

                    </td>

                    <td>

                        <a
                                th:href="@{/edit/{id}(id=${m.id})}"
                                class="btn btn-primary btn-sm">

                            Edit

                        </a>

                        <a
                                th:href="@{/delete/{id}(id=${m.id})}"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this medicine?')">

                            Delete

                        </a>

                        <a
                                th:href="@{/taken/{id}(id=${m.id})}"
                                class="btn btn-success btn-sm">

                            Taken

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

    const audio = new Audio('/alarm.mp3');

    Notification.requestPermission();

    setInterval(function () {

        fetch("/reminder")
            .then(response => response.text())
            .then(data => {

                if (data !== "") {

                    audio.play();

                    if (Notification.permission === "granted") {

                        new Notification("💊 Medicine Reminder", {

                            body: data

                        });

                    } else {

                        alert(data);

                    }

                }

            });

    }, 60000);

</script>

</body>

</html>
